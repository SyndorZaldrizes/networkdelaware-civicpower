<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="From Civic Learning to Civic Power, Network Delaware's statewide K–12 civic education initiative building equitable civic capacity across all communities.">
  <title>From Civic Learning to Civic Power | Network Delaware</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    /* ── HERO ─────────────────────────────────────────────── */
    .hero {
      background: var(--black);
      min-height: 92vh;
      display: grid;
      grid-template-rows: 1fr auto;
      position: relative;
      overflow: hidden;
    }
    .hero-grid-bg {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(212,160,23,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,160,23,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-diagonal {
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 120px; background: var(--paper);
      clip-path: polygon(0 100%, 100% 100%, 100% 0);
    }
    .hero-content {
      display: flex; flex-direction: column; justify-content: center;
      padding: 6rem 0 3rem;
      position: relative; z-index: 2;
    }
    .hero-eyebrow {
      font-family: var(--font-mono); font-size: 0.62rem;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 2rem;
      display: flex; align-items: center; gap: 1rem;
      opacity: 0; animation: fadeUp 0.7s var(--ease-out) 0.1s forwards;
    }
    .hero-eyebrow::before { content: ''; width: 40px; height: 2px; background: var(--gold); }
    .hero-main { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 4rem; align-items: end; }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(4rem, 10vw, 9rem);
      line-height: 0.9; color: var(--white);
      letter-spacing: 0.02em;
      opacity: 0; animation: fadeUp 0.8s var(--ease-out) 0.25s forwards;
    }
    .hero-title .gold { color: var(--gold); }
    .hero-title .strike {
      position: relative; display: inline-block;
      text-decoration: none;
    }
    .hero-title .strike::after {
      content: ''; position: absolute;
      left: 0; right: 0; top: 50%; height: 6px;
      background: var(--red); transform: rotate(-1deg);
    }
    .hero-right {
      opacity: 0; animation: fadeUp 0.7s var(--ease-out) 0.45s forwards;
      padding-bottom: 1rem;
    }
    .hero-sub {
      font-family: var(--font-serif); font-size: 1.1rem; font-style: italic;
      color: rgba(245,240,232,0.65); line-height: 1.8;
      margin-bottom: 2.5rem; border-left: 3px solid var(--gold);
      padding-left: 1.5rem;
    }
    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }
    .hero-ticker {
      background: rgba(212,160,23,0.08); border: 1px solid var(--border);
      padding: 1rem 1.5rem; margin-top: 2.5rem;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: var(--border);
    }
    .ticker-cell {
      background: rgba(10,10,8,0.85);
      padding: 1.2rem 1rem; text-align: center;
    }
    .ticker-num {
      font-family: var(--font-display); font-size: 2.8rem;
      color: var(--gold-lt); display: block; line-height: 1;
    }
    .ticker-label {
      font-family: var(--font-mono); font-size: 0.52rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(245,240,232,0.35); display: block; margin-top: 0.4rem;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

    /* ── ARGUMENT SECTION ─────────────────────────────────── */
    .argument-wrap { background: var(--paper); }
    .argument-inner {
      display: grid; grid-template-columns: 0.9fr 1.1fr;
      gap: 0; min-height: 480px;
    }
    .argument-left {
      background: var(--black); padding: 4rem;
      display: flex; flex-direction: column; justify-content: center;
    }
    .argument-left .section-label { color: var(--gold); }
    .argument-left .section-title { color: var(--white); font-size: clamp(2.5rem, 5vw, 4rem); }
    .argument-left p {
      color: rgba(245,240,232,0.62); line-height: 1.85;
      font-size: 1rem; margin-bottom: 1.2rem;
    }
    .argument-right {
      background: var(--paper-dk); padding: 4rem;
      display: flex; flex-direction: column; gap: 1.2rem; justify-content: center;
    }
    .data-block {
      background: var(--white); border-left: 4px solid var(--gold);
      padding: 1.4rem 1.6rem; display: flex; gap: 1.5rem; align-items: flex-start;
    }
    .data-block.red-accent { border-left-color: var(--red); }
    .data-num {
      font-family: var(--font-display); font-size: 3rem;
      color: var(--gold); line-height: 1; flex-shrink: 0; min-width: 80px;
    }
    .data-num.red { color: var(--red); }
    .data-body p { font-size: 0.9rem; color: var(--gray); line-height: 1.7; }
    .data-body small {
      font-family: var(--font-mono); font-size: 0.55rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--gray-lt); display: block; margin-top: 0.4rem;
    }
    .blockquote-pull {
      font-family: var(--font-display); font-size: 2rem;
      color: var(--white); line-height: 1.1; margin-top: 1.5rem;
      letter-spacing: 0.01em;
    }
    .blockquote-pull span { color: var(--gold); }

    /* ── FRONTS ───────────────────────────────────────────── */
    .fronts-wrap { background: var(--paper); overflow: hidden; }
    .fronts-header {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 4rem; align-items: end; margin-bottom: 3rem;
    }
    .fronts-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0; border: 2px solid var(--black);
    }
    .front-card {
      border-right: 2px solid var(--black);
      border-bottom: 2px solid var(--black);
      padding: 2.5rem; background: var(--white);
      transition: background 0.25s; cursor: default;
      position: relative; overflow: hidden;
    }
    .front-card:nth-child(2n) { border-right: none; }
    .front-card:nth-child(3), .front-card:nth-child(4) { border-bottom: none; }
    .front-card::before {
      content: attr(data-num);
      font-family: var(--font-display); font-size: 8rem;
      color: rgba(10,10,8,0.04); position: absolute;
      bottom: -1rem; right: 1rem; line-height: 1;
      pointer-events: none; transition: color 0.25s;
    }
    .front-card:hover { background: var(--black); }
    .front-card:hover .front-num { color: var(--gold); }
    .front-card:hover h3 { color: var(--white); }
    .front-card:hover p { color: rgba(245,240,232,0.55); }
    .front-card:hover .front-arrow { color: var(--gold); }
    .front-card:hover::before { color: rgba(212,160,23,0.08); }
    .front-num {
      font-family: var(--font-mono); font-size: 0.58rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1rem; display: block;
      transition: color 0.25s;
    }
    .front-card h3 {
      font-family: var(--font-display); font-size: 1.8rem;
      color: var(--black); margin-bottom: 0.8rem; line-height: 1.05;
      letter-spacing: 0.02em; transition: color 0.25s;
    }
    .front-card p {
      font-size: 0.9rem; color: var(--gray); line-height: 1.75;
      position: relative; z-index: 1; transition: color 0.25s;
    }
    .front-arrow {
      margin-top: 1.5rem; display: block;
      font-family: var(--font-mono); font-size: 0.6rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gray-lt); transition: color 0.25s;
    }

    /* ── CIVIC ACTION WHEEL ───────────────────────────────── */
    .cycle-wrap { background: var(--black); padding: 6rem 0; overflow: hidden; }
    .cycle-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
    .cycle-left .section-label { color: var(--gold); }
    .cycle-left .section-title { color: var(--white); font-size: clamp(2.5rem, 5vw, 4rem); }
    .cycle-left p { color: rgba(245,240,232,0.6); line-height: 1.85; margin-bottom: 2rem; }
    .cycle-visual { position: relative; }
    .cycle-wheel {
      width: 340px; height: 340px; position: relative; margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <main id="main">
    <!-- Content would follow here -->
  </main>
  <div id="footer-placeholder"></div>
  <script src="scripts/main.js"></script>
</body>
</html>
